name: notify

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Enviar WhatsApp de prueba con el proximo partido (ignora ventana de tiempo)"
        type: boolean
        default: false

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run notifier
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python src/main.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/sent.json state/fixtures_cache.json
          if git diff --staged --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "chore: update notification state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push ok on attempt $attempt"
              exit 0
            fi
            echo "push rejected, rebasing and retrying ($attempt)"
            git pull --rebase origin main
          done
          echo "push failed after retries"
          exit 1
